name: Kamino liquidity monitor

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

# Never run two checks at once (would race on the state.json commit).
concurrency:
  group: kamino-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Check Kamino liquidity
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RPC_URL: ${{ secrets.RPC_URL }}
          THRESHOLD: ${{ vars.THRESHOLD }}
        run: node monitor.js

      - name: Persist state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update liquidity state [skip ci]"
            git push
          fi
